name: Update SG01 DNS to AWS - Debug

on:
  workflow_dispatch:

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
    - name: Check current DNS
      run: |
        echo "=== Current DNS ==="
        dig +short kkk.onemorething.pp.ua
        
    - name: Get Cloudflare DNS Record
      run: |
        echo "=== Getting DNS Record ==="
        DNS_RECORDS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records?name=kkk.onemorething.pp.ua"           -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}"           -H "Content-Type: application/json")
        
        echo "Response:"
        echo "$DNS_RECORDS" | jq .
        
        DNS_ID=$(echo "$DNS_RECORDS" | jq -r '.result[] | select(.name == "kkk.onemorething.pp.ua") | .id')
        DNS_IP=$(echo "$DNS_RECORDS" | jq -r '.result[] | select(.name == "kkk.onemorething.pp.ua") | .content')
        
        echo "DNS ID: $DNS_ID"
        echo "Current DNS IP: $DNS_IP"
        echo "dns_id=$DNS_ID" >> $GITHUB_OUTPUT
        echo "dns_ip=$DNS_IP" >> $GITHUB_OUTPUT
        
    - name: Update DNS to AWS IP
      run: |
        echo "=== Updating DNS ==="
        NEW_IP="13.215.250.247"
        DNS_ID="${{ steps.get_dns.outputs.dns_id }}"
        
        echo "Updating DNS ID: $DNS_ID to IP: $NEW_IP"
        
        UPDATE_DATA=$(jq -n           --arg type "A"           --arg name "kkk.onemorething.pp.ua"           --arg content "$NEW_IP"           --argjson proxied false           '{type: $type, name: $name, content: $content, proxied: $proxied}')
        
        echo "Update data: $UPDATE_DATA"
        
        RESPONSE=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records/$DNS_ID"           -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}"           -H "Content-Type: application/json"           --data "$UPDATE_DATA")
        
        echo "Update Response:"
        echo "$RESPONSE" | jq .
        
    - name: Verify DNS Update
      run: |
        echo "=== Verifying DNS ==="
        sleep 10
        dig +short kkk.onemorething.pp.ua
