name: DO AU01 DNS Update

on:
  workflow_dispatch:

env:
  DOMAIN: 'jjs.onemorething.pp.ua'
  CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
  CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  PROXIED: 'false'

jobs:
  check-and-update-dns:
    runs-on: ubuntu-latest
    steps:
    - name: Check Current DNS IP
      id: dns_check
      run: |
        CURRENT_DNS_IP=$(dig +short ${{ env.DOMAIN }} | head -n1)
        echo "Current DNS IP: $CURRENT_DNS_IP"
        echo "CURRENT_DNS_IP=$CURRENT_DNS_IP" >> $GITHUB_ENV

    - name: Get Cloudflare DNS Record Info
      id: get_dns_record
      run: |
        DNS_RECORDS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ env.CF_ZONE_ID }}/dns_records?name=${{ env.DOMAIN }}" \
          -H "Authorization: Bearer ${{ env.CF_API_TOKEN }}" \
          -H "Content-Type: application/json")
        
        echo "DNS Records Response:"
        echo "$DNS_RECORDS" | jq .
        
        DNS_ID=$(echo "$DNS_RECORDS" | jq -r '.result[] | select(.name == "${{ env.DOMAIN }}") | .id')
        DNS_IP=$(echo "$DNS_RECORDS" | jq -r '.result[] | select(.name == "${{ env.DOMAIN }}") | .content')
        
        if [ -z "$DNS_ID" ] || [ "$DNS_ID" = "null" ]; then
          echo "No DNS record found for ${{ env.DOMAIN }}"
          exit 1
        fi
        
        echo "DNS Record ID: $DNS_ID"
        echo "DNS Record IP: $DNS_IP"
        echo "DNS_ID=$DNS_ID" >> $GITHUB_ENV
        echo "DNS_IP=$DNS_IP" >> $GITHUB_ENV

    - name: Get Droplet IP from DigitalOcean
      id: get_droplet_ip
      env:
        DO_TOKEN: ${{ secrets.DO_API_TOKEN }}
      run: |
        DROPLET_INFO=$(curl -s -X GET "https://api.digitalocean.com/v2/droplets" \
          -H "Authorization: Bearer $DO_TOKEN" \
          -H "Content-Type: application/json")
        
        echo "Droplet Info:"
        echo "$DROPLET_INFO" | jq '.droplets[] | {name: .name, id: .id, region: .region.slug}'
        
        NEW_IP=$(echo "$DROPLET_INFO" | jq -r '.droplets[] | select(.name == "au01") | .networks.v4[] | select(.type == "public") | .ip_address')
        
        if [ -z "$NEW_IP" ] || [ "$NEW_IP" = "null" ]; then
          echo "❌ Could not get droplet IP from API"
          exit 1
        fi
        
        echo "Droplet IP: $NEW_IP"
        echo "NEW_IP=$NEW_IP" >> $GITHUB_ENV

    - name: Check if DNS needs update
      id: check_update
      run: |
        # 比较 DNS IP 和 DO IP
        if [ "$DNS_IP" = "$NEW_IP" ]; then
          echo "✅ DNS IP ($DNS_IP) matches Droplet IP ($NEW_IP), no update needed"
          echo "NEED_UPDATE=false" >> $GITHUB_ENV
        else
          echo "⚠️ DNS IP mismatch: DNS=$DNS_IP, Droplet=$NEW_IP"
          echo "NEED_UPDATE=true" >> $GITHUB_ENV
        fi
        
        # 同时检查服务器连通性作为辅助判断
        echo "Checking server connectivity..."
        if timeout 5 bash -c "</dev/tcp/$NEW_IP/443" 2>/dev/null; then
          echo "✅ New IP ($NEW_IP) port 443 is reachable"
        else
          echo "⚠️ New IP ($NEW_IP) port 443 not reachable (may be normal for Shadowsocks)"
        fi

    - name: Update Cloudflare DNS Record
      if: env.NEED_UPDATE == 'true'
      run: |
        UPDATE_DATA=$(jq -n \
          --arg type "A" \
          --arg name "${{ env.DOMAIN }}" \
          --arg content "$NEW_IP" \
          --argjson proxied false \
          '{type: $type, name: $name, content: $content, proxied: $proxied}')
        
        echo "Updating DNS with data: $UPDATE_DATA"
        
        RESPONSE=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ env.CF_ZONE_ID }}/dns_records/${{ env.DNS_ID }}" \
          -H "Authorization: Bearer ${{ env.CF_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data "$UPDATE_DATA")
        
        echo "Update response:"
        echo "$RESPONSE" | jq .
        
        SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
        if [ "$SUCCESS" = "true" ]; then
          echo "✅ DNS updated successfully to $NEW_IP"
        else
          echo "❌ DNS update failed"
          echo "$RESPONSE" | jq '.errors'
          exit 1
        fi

    - name: Send Notification
      if: env.NEED_UPDATE == 'true'
      env:
        BARK_URL: ${{ secrets.BARK_FULL_URL }}
      run: |
        if [ -n "$BARK_URL" ]; then
          curl -s "$BARK_URL" \
            --data-urlencode "title=DO AU01 DNS Updated" \
            --data-urlencode "body=IP changed from $DNS_IP to $NEW_IP" \
            > /dev/null
          echo "Notification sent"
        else
          echo "No BARK_URL configured, skipping notification"
        fi

    - name: Summary
      run: |
        echo "========================================"
        echo "Domain: ${{ env.DOMAIN }}"
        echo "Old DNS IP: $DNS_IP"
        echo "New Droplet IP: $NEW_IP"
        echo "Update needed: $NEED_UPDATE"
        echo "========================================"
