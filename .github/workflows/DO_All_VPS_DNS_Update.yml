name: DO All VPS DNS Update

on:
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update all DNS records'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
  CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  DO_TOKEN: ${{ secrets.DO_API_TOKEN }}
  PROXIED: 'false'

jobs:
  update-sg01:
    runs-on: ubuntu-latest
    steps:
    - name: Update SG01 DNS
      run: |
        DOMAIN="kkk.onemorething.pp.ua"
        
        # Get DNS record
        DNS_RECORDS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ env.CF_ZONE_ID }}/dns_records?name=$DOMAIN" \
          -H "Authorization: Bearer ${{ env.CF_API_TOKEN }}" \
          -H "Content-Type: application/json")
        
        DNS_ID=$(echo "$DNS_RECORDS" | jq -r ".result[] | select(.name == \"$DOMAIN\") | .id")
        DNS_IP=$(echo "$DNS_RECORDS" | jq -r ".result[] | select(.name == \"$DOMAIN\") | .content")
        
        # Get actual droplet IP
        DROPLET_IP=$(curl -s -X GET "https://api.digitalocean.com/v2/droplets" \
          -H "Authorization: Bearer ${{ env.DO_TOKEN }}" | jq -r '.droplets[] | select(.name == "sg01") | .networks.v4[] | select(.type == "public") | .ip_address')
        
        if [ -z "$DROPLET_IP" ] || [ "$DROPLET_IP" = "null" ]; then
          DROPLET_IP="168.144.39.89"
        fi
        
        echo "SG01 - Domain: $DOMAIN, DNS IP: $DNS_IP, Droplet IP: $DROPLET_IP"
        
        if [ "$DNS_IP" != "$DROPLET_IP" ] || [ "${{ inputs.force_update }}" = "true" ]; then
          UPDATE_DATA=$(jq -n --arg type "A" --arg name "$DOMAIN" --arg content "$DROPLET_IP" --argjson proxied false '{type: $type, name: $name, content: $content, proxied: $proxied}')
          
          RESPONSE=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ env.CF_ZONE_ID }}/dns_records/$DNS_ID" \
            -H "Authorization: Bearer ${{ env.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$UPDATE_DATA")
          
          if [ "$(echo "$RESPONSE" | jq -r '.success')" = "true" ]; then
            echo "✅ SG01 DNS updated to $DROPLET_IP"
          else
            echo "❌ SG01 update failed: $(echo "$RESPONSE" | jq -r '.errors')"
          fi
        else
          echo "✓ SG01 DNS is up to date"
        fi

  update-us01:
    runs-on: ubuntu-latest
    steps:
    - name: Update US01 DNS
      run: |
        DOMAIN="dgo.us.onemorething.pp.ua"
        
        DNS_RECORDS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ env.CF_ZONE_ID }}/dns_records?name=$DOMAIN" \
          -H "Authorization: Bearer ${{ env.CF_API_TOKEN }}" \
          -H "Content-Type: application/json")
        
        DNS_ID=$(echo "$DNS_RECORDS" | jq -r ".result[] | select(.name == \"$DOMAIN\") | .id")
        DNS_IP=$(echo "$DNS_RECORDS" | jq -r ".result[] | select(.name == \"$DOMAIN\") | .content")
        
        DROPLET_IP=$(curl -s -X GET "https://api.digitalocean.com/v2/droplets" \
          -H "Authorization: Bearer ${{ env.DO_TOKEN }}" | jq -r '.droplets[] | select(.name == "us01") | .networks.v4[] | select(.type == "public") | .ip_address')
        
        if [ -z "$DROPLET_IP" ] || [ "$DROPLET_IP" = "null" ]; then
          DROPLET_IP="157.230.49.155"
        fi
        
        echo "US01 - Domain: $DOMAIN, DNS IP: $DNS_IP, Droplet IP: $DROPLET_IP"
        
        if [ "$DNS_IP" != "$DROPLET_IP" ] || [ "${{ inputs.force_update }}" = "true" ]; then
          UPDATE_DATA=$(jq -n --arg type "A" --arg name "$DOMAIN" --arg content "$DROPLET_IP" --argjson proxied false '{type: $type, name: $name, content: $content, proxied: $proxied}')
          
          RESPONSE=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ env.CF_ZONE_ID }}/dns_records/$DNS_ID" \
            -H "Authorization: Bearer ${{ env.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$UPDATE_DATA")
          
          if [ "$(echo "$RESPONSE" | jq -r '.success')" = "true" ]; then
            echo "✅ US01 DNS updated to $DROPLET_IP"
          else
            echo "❌ US01 update failed: $(echo "$RESPONSE" | jq -r '.errors')"
          fi
        else
          echo "✓ US01 DNS is up to date"
        fi

  update-au01:
    runs-on: ubuntu-latest
    steps:
    - name: Update AU01 DNS
      run: |
        DOMAIN="jjs.onemorething.pp.ua"
        
        DNS_RECORDS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ env.CF_ZONE_ID }}/dns_records?name=$DOMAIN" \
          -H "Authorization: Bearer ${{ env.CF_API_TOKEN }}" \
          -H "Content-Type: application/json")
        
        DNS_ID=$(echo "$DNS_RECORDS" | jq -r ".result[] | select(.name == \"$DOMAIN\") | .id")
        DNS_IP=$(echo "$DNS_RECORDS" | jq -r ".result[] | select(.name == \"$DOMAIN\") | .content")
        
        DROPLET_IP=$(curl -s -X GET "https://api.digitalocean.com/v2/droplets" \
          -H "Authorization: Bearer ${{ env.DO_TOKEN }}" | jq -r '.droplets[] | select(.name == "au01") | .networks.v4[] | select(.type == "public") | .ip_address')
        
        if [ -z "$DROPLET_IP" ] || [ "$DROPLET_IP" = "null" ]; then
          DROPLET_IP="134.199.164.133"
        fi
        
        echo "AU01 - Domain: $DOMAIN, DNS IP: $DNS_IP, Droplet IP: $DROPLET_IP"
        
        if [ "$DNS_IP" != "$DROPLET_IP" ] || [ "${{ inputs.force_update }}" = "true" ]; then
          UPDATE_DATA=$(jq -n --arg type "A" --arg name "$DOMAIN" --arg content "$DROPLET_IP" --argjson proxied false '{type: $type, name: $name, content: $content, proxied: $proxied}')
          
          RESPONSE=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ env.CF_ZONE_ID }}/dns_records/$DNS_ID" \
            -H "Authorization: Bearer ${{ env.CF_API_TOKEN }}" \
